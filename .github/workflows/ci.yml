name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]
  workflow_call:  # allows CD to call this workflow

jobs:
  lint-and-build:
    name: Lint, Type-check & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ── Backend ───────────────────────────────────────────────────────────
      - name: Setup Node (backend)
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"
          cache-dependency-path: bakery-backend/package-lock.json

      - name: Install backend dependencies
        working-directory: bakery-backend
        run: npm ci

      - name: Generate Prisma client
        working-directory: bakery-backend
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/ci_db
        run: npx prisma generate

      - name: Type-check backend
        working-directory: bakery-backend
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/ci_db
        run: npm run typecheck

      - name: Build backend
        working-directory: bakery-backend
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/ci_db
        run: npm run build

      # ── Frontend ──────────────────────────────────────────────────────────
      - name: Setup Node (frontend)
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"
          cache-dependency-path: bakery-frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: bakery-frontend
        run: npm ci

      - name: Lint frontend
        working-directory: bakery-frontend
        run: npm run lint

      - name: Build frontend
        working-directory: bakery-frontend
        run: npm run build

      # ── Admin ─────────────────────────────────────────────────────────────
      - name: Setup Node (admin)
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"
          cache-dependency-path: bakery-admin/package-lock.json

      - name: Install admin dependencies
        working-directory: bakery-admin
        run: npm ci

      - name: Lint admin
        working-directory: bakery-admin
        run: npm run lint

      - name: Build admin
        working-directory: bakery-admin
        run: npm run build

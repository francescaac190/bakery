name: CD

on:
  push:
    branches: [master]

# Only run one deployment at a time; cancel in-flight if a new push arrives
concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  # CI must pass before we deploy
  ci:
    uses: ./.github/workflows/ci.yml

  deploy:
    name: Deploy to Render
    needs: ci
    runs-on: ubuntu-latest

    steps:
      - name: Deploy backend
        if: ${{ secrets.RENDER_DEPLOY_HOOK_BACKEND != '' }}
        run: curl -s --fail -X POST "${{ secrets.RENDER_DEPLOY_HOOK_BACKEND }}"

      - name: Deploy frontend
        if: ${{ secrets.RENDER_DEPLOY_HOOK_FRONTEND != '' }}
        run: curl -s --fail -X POST "${{ secrets.RENDER_DEPLOY_HOOK_FRONTEND }}"

      - name: Deploy admin
        if: ${{ secrets.RENDER_DEPLOY_HOOK_ADMIN != '' }}
        run: curl -s --fail -X POST "${{ secrets.RENDER_DEPLOY_HOOK_ADMIN }}"

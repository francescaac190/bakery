name: Admin Web CI/CD

on:
  push:
    branches: ["**"]
    paths:
      - "bakery-admin/**"
      - ".github/workflows/admin.yml"
  pull_request:
    branches: ["**"]
    paths:
      - "bakery-admin/**"
      - ".github/workflows/admin.yml"

concurrency:
  group: admin-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Lint & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"
          cache-dependency-path: bakery-admin/package-lock.json

      - name: Install dependencies
        working-directory: bakery-admin
        run: npm ci

      - name: Lint
        working-directory: bakery-admin
        run: npm run lint

      - name: Build
        working-directory: bakery-admin
        run: npm run build

  deploy:
    name: Deploy to Render
    needs: ci
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - name: Deploy admin
        run: curl -s --fail -X POST "${{ secrets.RENDER_DEPLOY_HOOK_ADMIN }}"

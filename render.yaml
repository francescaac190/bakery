services:
  # ── Backend (Node / Express) ──────────────────────────────────────────────
  - type: web
    name: bakery-backend
    runtime: node
    rootDir: bakery-backend
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 1313
      # Set these in the Render dashboard (mark as secret):
      - key: DATABASE_URL
        sync: false          # paste the Render Postgres internal URL here
      - key: ALLOWED_ORIGIN
        sync: false          # comma-separated frontend + admin URLs

  # ── Frontend (Vite SPA → static site) ────────────────────────────────────
  - type: web
    name: bakery-frontend
    runtime: static
    rootDir: bakery-frontend
    buildCommand: npm install && npm run build
    staticPublishPath: bakery-frontend/dist
    envVars:
      - key: VITE_API_URL
        sync: false          # e.g. https://bakery-backend.onrender.com/api/v1
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

  # ── Admin Panel (Vite SPA → static site) ─────────────────────────────────
  - type: web
    name: bakery-admin
    runtime: static
    rootDir: bakery-admin
    buildCommand: npm install && npm run build
    staticPublishPath: bakery-admin/dist
    envVars:
      - key: VITE_API_BASE_URL
        sync: false          # e.g. https://bakery-backend.onrender.com/api/v1
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

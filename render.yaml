services:
  # ── Backend (Node / Express) ──────────────────────────────────────────────
  - type: web
    name: bakery-backend
    runtime: node
    rootDir: bakery-backend
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 1313
      # Set these in the Render dashboard (mark as secret):
      - key: DATABASE_URL
        sync: false          # paste the Render Postgres internal URL here
      - key: ALLOWED_ORIGIN
        sync: false          # set to your frontend URL, e.g. https://bakery-frontend.onrender.com

  # ── Frontend (Vite SPA → static site) ────────────────────────────────────
  - type: static
    name: bakery-frontend
    rootDir: bakery-frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      # Set in Render dashboard — must match the backend web service URL above
      - key: VITE_API_URL
        sync: false          # e.g. https://bakery-backend.onrender.com/api/v1
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
